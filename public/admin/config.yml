backend:
  name: github
  repo: catuy/yauguru
  branch: main
  # Solo token de acceso personal — el botón OAuth "Sign In with GitHub"
  # necesitaría una GitHub OAuth App + un proxy propio (Worker/función)
  # para intercambiar el código por un token, algo que se evaluó y se
  # descartó a propósito (ver PROJECT.md, sección "Editor de catálogo").
  auth_methods: [token]

app_title: Yaugurú

logo:
  src: /logo-yauguru.png

media_folder: public/covers
public_folder: /covers

collections:
  - name: books
    label: Libros
    label_singular: Libro
    folder: src/content/books
    create: true
    delete: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: '{{title}}'
    summary: '{{title}} — {{fields.authors}}'
    sortable_fields: [title, year]
    fields:
      - label: Título
        name: title
        widget: string

      - label: Colecciones
        name: collections
        widget: relation
        collection: editorial-collections
        multiple: true
        min: 1
        search_fields: [name]
        value_field: '{{slug}}'
        display_fields: [name]
        hint: A qué colección(es) editorial(es) pertenece este libro.

      - label: Serie
        name: series
        widget: string
        required: false
        hint: No aparece en la ficha del libro, pero se usa para buscarlo en el buscador de la grilla.

      - label: Año de publicación
        name: year
        widget: number
        value_type: int
        required: false
        min: 1900
        max: 2030

      - label: Autores
        name: authors
        widget: list
        field: { label: Autor, name: author, widget: string }

      - label: Género
        name: genre
        widget: relation
        collection: genres
        required: false
        search_fields: [name]
        value_field: '{{slug}}'
        display_fields: [name]
        hint: A qué género pertenece este libro.

      - label: Notas
        name: notes
        widget: text
        required: false
        hint: 'Traductor/ilustrador/coedición/premios, como texto libre (ej: "Trad.: Fulano" en una línea, "Premio: Tal cosa" en otra). Los saltos de línea se respetan en la ficha del libro.'

      - label: Tapa
        name: coverImage
        widget: image
        required: false
        media_library:
          config:
            max_file_size: 5242880

  - name: editorial-collections
    label: Colecciones editoriales
    label_singular: Colección
    folder: src/content/collections
    create: true
    delete: true
    extension: md
    format: frontmatter
    identifier_field: name
    slug: '{{name}}'
    sortable_fields: [name, order]
    fields:
      - label: Nombre
        name: name
        widget: string

      - label: Orden
        name: order
        widget: number
        value_type: int
        hint: Los números más bajos aparecen primero.

  - name: genres
    label: Géneros
    label_singular: Género
    folder: src/content/genres
    create: true
    delete: true
    extension: md
    format: frontmatter
    identifier_field: name
    slug: '{{name}}'
    sortable_fields: [name, order]
    fields:
      - label: Nombre
        name: name
        widget: string

      - label: Orden
        name: order
        widget: number
        value_type: int
        hint: Los números más bajos aparecen primero (así se ordenan en el filtro "Género" de la grilla).

  - name: about
    label: Nosotros
    files:
      - name: about
        label: Nosotros
        file: src/content/about/about.md
        fields:
          - label: Texto
            name: body
            widget: markdown
            hint: El texto de la sección "Sobre nosotros" de la portada. Cada párrafo separado por una línea en blanco se muestra como un párrafo aparte. Los links (email, instagram, youtube, etc.) van como link de markdown dentro del mismo texto.
